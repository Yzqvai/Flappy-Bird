<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flappy Bird Pixelated Ultimate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Press Start 2P', cursive;
            touch-action: none;
        }
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        canvas {
            display: block;
            image-rendering: pixelated;
            box-shadow: 0 0 100px rgba(0,0,0,1);
        }
        #ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            z-index: 10;
        }
        .menu-card {
            background: #ded895;
            padding: 2rem;
            border: 8px solid #543847;
            text-align: center;
            pointer-events: auto;
            box-shadow: 8px 8px 0 #222;
        }
        .btn {
            background: #e75a10;
            color: white;
            border: 4px solid #543847;
            padding: 1rem 1.5rem;
            font-size: 0.8rem;
            cursor: pointer;
            box-shadow: 4px 4px 0 #543847;
            margin-top: 1rem;
        }
        .btn:hover { background: #f17b3d; }
        .hidden { display: none; opacity: 0; }
        
        #score-display {
            position: absolute;
            top: 40px;
            font-size: 3rem;
            color: white;
            text-shadow: 4px 4px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000;
            z-index: 5;
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    <div id="score-display" class="hidden">0</div>
    <div id="ui-overlay">
        <div id="start-screen" class="menu-card">
            <h1 class="text-2xl text-[#f7941d] mb-6" style="line-height: 1.6;">ULTIMATE<br>FLAPPY</h1>
            <p class="text-[0.6rem] text-[#543847] mb-6">KLIK ATAU SPASI</p>
            <button id="start-btn" class="btn">MULAI MAIN</button>
        </div>
        <div id="game-over-screen" class="menu-card hidden">
            <h1 class="text-xl text-red-600 mb-4">CRASH!</h1>
            <div class="bg-[#543847] p-4 text-white mb-4">
                <p class="text-[0.6rem] mb-2">SKOR SEKARANG</p>
                <p class="text-xl mb-4" id="final-score">0</p>
                <p class="text-[0.5rem] text-yellow-400">SKOR TERBAIK: <span id="best-score">0</span></p>
            </div>
            <button id="restart-btn" class="btn">COBA LAGI</button>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreElement = document.getElementById('score-display');
    const startScreen = document.getElementById('start-screen');
    const gameOverScreen = document.getElementById('game-over-screen');
    
    const CANVAS_WIDTH = 360;
    const CANVAS_HEIGHT = 540;
    const GRAVITY_BASE = 0.24;
    const JUMP = -4.8;
    
    let bird = { x: 60, y: 250, velocity: 0, width: 34, height: 24, particles: [] };
    let pipes = [];
    let backgroundBirds = [];
    let score = 0;
    let highScore = localStorage.getItem('pixelFlappyUltBest') || 0;
    let frames = 0;
    let gameState = 'START';
    let currentPipeSpeed = 2.2;
    let currentSpawnRate = 100;
    let screenShake = 0;
    let flashOpacity = 0;
    let shootingStar = { active: false, x: 0, y: 0, vx: 0, vy: 0, life: 0 };

    const skyColors = {
        day: { r: 112, g: 197, b: 206 },
        sunset: { r: 253, g: 94, b: 83 },
        night: { r: 10, g: 15, b: 35 }
    };

    function init() {
        canvas.width = CANVAS_WIDTH;
        canvas.height = CANVAS_HEIGHT;
        window.addEventListener('keydown', (e) => { if (e.code === 'Space') handleAction(); });
        canvas.addEventListener('mousedown', (e) => { if(e.button === 0) handleAction(); });
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleAction(); }, { passive: false });
        document.getElementById('start-btn').onclick = startGame;
        document.getElementById('restart-btn').onclick = startGame;

        for(let i=0; i<6; i++) {
            backgroundBirds.push({
                x: Math.random() * CANVAS_WIDTH,
                y: 50 + Math.random() * 200,
                speed: 0.2 + Math.random() * 0.6,
                phase: Math.random() * Math.PI * 2
            });
        }
        requestAnimationFrame(gameLoop);
    }

    function handleAction() {
        if (gameState === 'PLAYING') {
            bird.velocity = JUMP;
            for(let i=0; i<6; i++) {
                bird.particles.push({
                    x: bird.x, y: bird.y + 12,
                    vx: -Math.random() * 3, vy: Math.random() * 4 - 2,
                    life: 1.0, size: Math.random() * 5 + 2,
                    color: i % 2 === 0 ? '#FFF' : '#F7D010'
                });
            }
        } else if (gameState === 'START') startGame();
    }

    function startGame() {
        bird = { x: 60, y: 250, velocity: 0, width: 34, height: 24, particles: [] };
        pipes = [];
        score = 0;
        frames = 0;
        currentPipeSpeed = 2.2;
        gameState = 'PLAYING';
        flashOpacity = 0;
        screenShake = 0;
        startScreen.classList.add('hidden');
        gameOverScreen.classList.add('hidden');
        scoreElement.classList.remove('hidden');
        scoreElement.innerText = '0';
    }

    function triggerGameOver() {
        if (gameState === 'GAMEOVER') return;
        gameState = 'GAMEOVER';
        screenShake = 18;
        flashOpacity = 0.8;
        if (score > highScore) {
            highScore = score;
            localStorage.setItem('pixelFlappyUltBest', highScore);
        }
        document.getElementById('final-score').innerText = score;
        document.getElementById('best-score').innerText = highScore;
        setTimeout(() => {
            gameOverScreen.classList.remove('hidden');
            gameOverScreen.style.opacity = "1";
        }, 300);
        scoreElement.classList.add('hidden');
    }

    function drawPixelRect(x, y, w, h, color, border = null) {
        ctx.fillStyle = color;
        ctx.fillRect(Math.floor(x), Math.floor(y), Math.floor(w), Math.floor(h));
        if (border) {
            ctx.strokeStyle = border;
            ctx.lineWidth = 2;
            ctx.strokeRect(Math.floor(x), Math.floor(y), Math.floor(w), Math.floor(h));
        }
    }

    function drawBackground() {
        const cycleVal = Math.sin(frames * 0.0004);
        let r, g, b;
        if (cycleVal > 0) {
            r = Math.floor(skyColors.sunset.r * (1 - cycleVal) + skyColors.day.r * cycleVal);
            g = Math.floor(skyColors.sunset.g * (1 - cycleVal) + skyColors.day.g * cycleVal);
            b = Math.floor(skyColors.sunset.b * (1 - cycleVal) + skyColors.day.b * cycleVal);
        } else {
            const absVal = Math.abs(cycleVal);
            r = Math.floor(skyColors.sunset.r * (1 - absVal) + skyColors.night.r * absVal);
            g = Math.floor(skyColors.sunset.g * (1 - absVal) + skyColors.night.g * absVal);
            b = Math.floor(skyColors.sunset.b * (1 - absVal) + skyColors.night.b * absVal);
        }
        
        const skyBase = `rgb(${r},${g},${b})`;
        const skyDark = `rgb(${Math.max(0, r-40)},${Math.max(0, g-40)},${Math.max(0, b-40)})`;

        // Gradasi Langit
        const grad = ctx.createLinearGradient(0, 0, 0, CANVAS_HEIGHT);
        grad.addColorStop(0, skyDark);
        grad.addColorStop(0.7, skyBase);
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

        const angle = frames * 0.0004;
        const sunX = CANVAS_WIDTH/2 + Math.cos(angle) * 190;
        const sunY = CANVAS_HEIGHT/2 + Math.sin(angle) * 230;
        const moonX = CANVAS_WIDTH/2 + Math.cos(angle + Math.PI) * 190;
        const moonY = CANVAS_HEIGHT/2 + Math.sin(angle + Math.PI) * 230;

        // Bintang
        if (cycleVal < 0) {
            ctx.fillStyle = `rgba(255,255,255, ${Math.abs(cycleVal)})`;
            for(let i=0; i<30; i++) {
                const sx = (i * 131) % CANVAS_WIDTH;
                const sy = (i * 167) % (CANVAS_HEIGHT - 180);
                ctx.fillRect(sx, sy, 2, 2);
            }
        }

        // Matahari/Bulan
        drawPixelRect(sunX - 22, sunY - 22, 44, 44, '#F7D010');
        drawPixelRect(moonX - 15, moonY - 15, 30, 30, '#EEE');

        // Gunung Jauh (Parallax 1)
        const mtColor = cycleVal < -0.3 ? '#0a121a' : (cycleVal < 0.3 ? '#2d5a63' : '#3d8c94');
        ctx.fillStyle = mtColor;
        for(let i=0; i<4; i++) {
            const mx = (i * 200 - (frames * 0.1) % 800);
            ctx.beginPath();
            ctx.moveTo(mx, CANVAS_HEIGHT - 20);
            ctx.lineTo(mx + 150, CANVAS_HEIGHT - 180);
            ctx.lineTo(mx + 300, CANVAS_HEIGHT - 20);
            ctx.fill();
        }

        // Awan Kaya Warna
        ctx.fillStyle = `rgba(255,255,255, ${Math.max(0, cycleVal * 0.5)})`;
        for(let i=0; i<4; i++) {
            const cx = (CANVAS_WIDTH + 150 - (frames * 0.3 + i * 180) % (CANVAS_WIDTH + 300));
            const cy = 60 + i * 45;
            drawPixelRect(cx, cy, 70, 18, ctx.fillStyle);
            drawPixelRect(cx + 20, cy - 10, 30, 30, ctx.fillStyle);
            // Shadow awan
            ctx.fillStyle = 'rgba(200, 230, 255, 0.3)';
            drawPixelRect(cx + 5, cy + 18, 60, 4, ctx.fillStyle);
            ctx.fillStyle = `rgba(255,255,255, ${Math.max(0, cycleVal * 0.5)})`;
        }

        // Gedung Jauh (Parallax 2)
        ctx.fillStyle = cycleVal < 0 ? '#08121d' : '#1e5a66';
        for(let i=0; i<8; i++) {
            const gx = (i * 100 - (frames * 0.5) % 800);
            const gh = 100 + (i % 4) * 40;
            ctx.fillRect(gx, CANVAS_HEIGHT - gh - 20, 60, gh);
        }

        // Kabut Atmosfer Tengah
        ctx.fillStyle = `rgba(${r}, ${g}, ${b}, 0.3)`;
        ctx.fillRect(0, CANVAS_HEIGHT - 180, CANVAS_WIDTH, 160);

        // Gedung Kota Utama (Parallax 3)
        for(let i=0; i<5; i++) {
            const gx = (i * 150 - (frames * 0.8) % 750);
            const gh = 140 + (i % 2) * 60;
            const bCol = cycleVal < 0 ? '#050a14' : '#266b75';
            drawPixelRect(gx, CANVAS_HEIGHT - gh - 20, 85, gh, bCol, '#000');
            
            // Jendela Berwarna
            for(let j=0; j<4; j++) {
                for(let k=0; k<3; k++) {
                    if ((j+k+frames/20)%5 > 2) {
                        const winCol = cycleVal < -0.2 ? (j%2? '#f7d010' : '#4dc9ff') : '#1a434a';
                        drawPixelRect(gx + 15 + k*20, CANVAS_HEIGHT - gh + 15 + j*35, 10, 15, winCol);
                    }
                }
            }
            // Antena
            ctx.fillStyle = '#000';
            ctx.fillRect(gx + 20, CANVAS_HEIGHT - gh - 40, 2, 20);
            if (cycleVal < 0 && frames % 40 < 20) {
                ctx.fillStyle = '#ff3333';
                ctx.fillRect(gx + 19, CANVAS_HEIGHT - gh - 42, 4, 4);
            }
        }

        // Semak & Tanaman Depan
        const bushCol = cycleVal < 0 ? '#081c08' : '#4d801d';
        for(let i=0; i<12; i++) {
            const sx = (i * 60 - (frames * currentPipeSpeed % 720));
            drawPixelRect(sx, CANVAS_HEIGHT - 55, 50, 35, bushCol, '#000');
            // Detail buah/bunga pixel
            if (cycleVal > 0) {
                ctx.fillStyle = '#ff4d4d';
                ctx.fillRect(sx + 10, CANVAS_HEIGHT - 45, 3, 3);
                ctx.fillRect(sx + 35, CANVAS_HEIGHT - 35, 3, 3);
            }
        }

        // Ground (Lantai)
        drawPixelRect(0, CANVAS_HEIGHT - 20, CANVAS_WIDTH, 20, '#ded895', '#543847');
        ctx.fillStyle = '#73BF2E';
        for(let i=0; i<CANVAS_WIDTH + 40; i+=30) {
            const x = i - (frames * currentPipeSpeed % 30);
            ctx.fillRect(x, CANVAS_HEIGHT - 30, 20, 10);
            ctx.fillStyle = '#558c22';
            ctx.fillRect(x + 5, CANVAS_HEIGHT - 25, 10, 5);
            ctx.fillStyle = '#73BF2E';
        }
    }

    function drawBird() {
        bird.particles.forEach(p => {
            ctx.fillStyle = p.color;
            ctx.globalAlpha = p.life;
            ctx.fillRect(p.x, p.y, p.size, p.size);
        });
        ctx.globalAlpha = 1;
        ctx.save();
        ctx.translate(bird.x + bird.width/2, bird.y + bird.height/2);
        const rot = Math.min(Math.PI/2.4, Math.max(-Math.PI/5, bird.velocity * 0.16));
        ctx.rotate(rot);
        drawPixelRect(-16, -12, 32, 24, '#F7D010', '#000'); 
        drawPixelRect(-12, -8, 20, 8, '#FFE661'); 
        drawPixelRect(-18, -4, 12, 12, '#FFFFFF', '#000');
        drawPixelRect(8, -10, 10, 10, '#FFFFFF', '#000');
        drawPixelRect(13, -7, 5, 5, '#000');
        drawPixelRect(16, 2, 14, 10, '#F75A10', '#000');
        ctx.restore();
    }

    function drawPipes() {
        pipes.forEach(p => {
            const color = '#73BF2E';
            const border = '#111';
            drawPixelRect(p.x, 0, 52, p.topHeight, color, border);
            drawPixelRect(p.x - 6, p.topHeight - 26, 64, 26, color, border);
            const by = p.topHeight + p.gap;
            drawPixelRect(p.x, by, 52, CANVAS_HEIGHT - by, color, border);
            drawPixelRect(p.x - 6, by, 64, 26, color, border);
            // Detail tekstur pipa
            ctx.fillStyle = 'rgba(0,0,0,0.2)';
            ctx.fillRect(p.x + 35, 0, 10, p.topHeight);
            ctx.fillRect(p.x + 35, by, 10, CANVAS_HEIGHT - by);
        });
    }

    function update() {
        if (gameState !== 'PLAYING') return;
        currentPipeSpeed = 2.2 + (score * 0.05);
        bird.velocity += GRAVITY_BASE;
        bird.y += bird.velocity;
        bird.particles.forEach((p, i) => {
            p.x += p.vx; p.y += p.vy; p.life -= 0.025;
            if(p.life <= 0) bird.particles.splice(i, 1);
        });
        if (bird.y + bird.height >= CANVAS_HEIGHT - 20 || bird.y <= 0) triggerGameOver();
        if (frames % 100 === 0) {
            const gap = 140;
            const topH = Math.floor(Math.random() * (CANVAS_HEIGHT - gap - 120)) + 60;
            pipes.push({ x: CANVAS_WIDTH, topHeight: topH, gap: gap, passed: false });
        }
        for (let i = pipes.length - 1; i >= 0; i--) {
            pipes[i].x -= currentPipeSpeed;
            if (!pipes[i].passed && bird.x > pipes[i].x + 52) {
                score++;
                scoreElement.innerText = score;
                pipes[i].passed = true;
            }
            if (bird.x + bird.width - 8 > pipes[i].x && bird.x + 8 < pipes[i].x + 52) {
                if (bird.y + 8 < pipes[i].topHeight || bird.y + bird.height - 8 > pipes[i].topHeight + pipes[i].gap) triggerGameOver();
            }
            if (pipes[i].x + 80 < 0) pipes.splice(i, 1);
        }
        backgroundBirds.forEach(bb => {
            bb.x -= bb.speed;
            bb.y += Math.sin(frames * 0.05 + bb.phase) * 0.2;
            if (bb.x < -30) { bb.x = CANVAS_WIDTH + 30; bb.y = 50 + Math.random() * 200; }
        });
        frames++;
    }

    function gameLoop() {
        update();
        ctx.save();
        if (screenShake > 0) {
            ctx.translate((Math.random()-0.5)*screenShake, (Math.random()-0.5)*screenShake);
            screenShake *= 0.9;
        }
        drawBackground();
        // Burung latar belakang
        ctx.fillStyle = '#000';
        backgroundBirds.forEach(bb => {
            const w = Math.sin(frames * 0.2 + bb.phase) * 5;
            ctx.fillRect(bb.x, bb.y, 8, 2);
            ctx.fillRect(bb.x - 2, bb.y - w, 2, 2);
            ctx.fillRect(bb.x + 8, bb.y - w, 2, 2);
        });
        drawPipes();
        drawBird();
        if (gameState === 'START') bird.y = 250 + Math.sin(frames * 0.08) * 25;
        if (flashOpacity > 0) {
            ctx.fillStyle = `rgba(255,255,255,${flashOpacity})`;
            ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
            flashOpacity -= 0.05;
        }
        ctx.restore();
        requestAnimationFrame(gameLoop);
    }

    init();
</script>
</body>
</html>
